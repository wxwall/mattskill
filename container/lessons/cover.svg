<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1175 500" width="1175" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#fbf7f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#c4a97d"/>
    </linearGradient>
  </defs>
  <rect width="1175" height="500" fill="url(#bg)" rx="0"/>
  <rect x="40" y="475" width="1095" height="2" fill="url(#accent)" opacity="0.3"/>
  <rect x="40" y="40" width="200" height="28" rx="14" fill="none" stroke="#c4a97d" stroke-width="1"/>
  <text x="140" y="58" text-anchor="middle" fill="#8b7355" font-size="12" font-family="'PingFang SC','Microsoft YaHei',sans-serif" letter-spacing="2">Apple 官方开源 · 2025</text>
  <text x="80" y="140" fill="#3d2b1f" font-size="64" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif" letter-spacing="2">Apple Container 是什么？</text>
  <text x="80" y="200" fill="#8b6914" font-size="36" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif" letter-spacing="1">Swift 写的原生容器工具，专为 M 芯片 Mac 打造</text>
  <rect x="80" y="228" width="40" height="2" fill="#c4a97d"/>
  <text x="80" y="270" fill="#5c4033" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    <tspan x="80" dy="0">Apple 开源的 Linux 容器工具——每个容器一个轻量 VM，</tspan>
    <tspan x="80" dy="28">OCI 兼容、亚秒启动、硬件级隔离。自带完整 CLI 工具链。</tspan>
  </text>
  <rect x="80" y="330" width="230" height="100" rx="10" fill="#fff" stroke="#e8dcc8" stroke-width="1.5"/>
  <text x="195" y="372" text-anchor="middle" fill="#8b6914" font-size="36" font-weight="700" font-family="Georgia,'PingFang SC',serif">46.6K+</text>
  <text x="195" y="404" text-anchor="middle" fill="#8b7355" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">GitHub Stars</text>
  <rect x="330" y="330" width="230" height="100" rx="10" fill="#fff" stroke="#e8dcc8" stroke-width="1.5"/>
  <text x="445" y="372" text-anchor="middle" fill="#7d5f52" font-size="36" font-weight="700" font-family="Georgia,'PingFang SC',serif">Swift</text>
  <text x="445" y="404" text-anchor="middle" fill="#8b7355" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">纯 Swift 编写</text>
  <rect x="580" y="330" width="230" height="100" rx="10" fill="#fff" stroke="#e8dcc8" stroke-width="1.5"/>
  <text x="695" y="372" text-anchor="middle" fill="#6b5a30" font-size="36" font-weight="700" font-family="Georgia,'PingFang SC',serif">1 VM</text>
  <text x="695" y="404" text-anchor="middle" fill="#8b7355" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">每容器独立虚拟机</text>
  <rect x="830" y="330" width="230" height="100" rx="10" fill="#fff" stroke="#e8dcc8" stroke-width="1.5"/>
  <text x="945" y="372" text-anchor="middle" fill="#5c4033" font-size="36" font-weight="700" font-family="Georgia,'PingFang SC',serif">OCI</text>
  <text x="945" y="404" text-anchor="middle" fill="#8b7355" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">兼容 Docker 生态</text>
  <text x="900" y="460" fill="#c4a97d" font-size="12" font-family="'PingFang SC','Microsoft YaHei',sans-serif" text-anchor="end" font-style="italic">"Apple 版的 Docker，但每个容器有自己的虚拟机"</text>
</svg>
