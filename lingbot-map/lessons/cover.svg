<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1175 500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&amp;display=swap');
      text { font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="1175" height="500" fill="#f5f0e8" rx="0"/>

  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="1175" height="4" fill="#8b6914"/>

  <!-- 版本标签 -->
  <rect x="40" y="28" width="120" height="26" rx="13" fill="#8b6914" opacity="0.15"/>
  <text x="100" y="46" text-anchor="middle" fill="#8b6914" font-size="11" font-weight="700">🔬 前沿AI · 3D重建</text>

  <!-- 主标题 -->
  <text x="40" y="100" fill="#3d2b1f" font-size="36" font-weight="900">LingBot-Map</text>

  <!-- 副标题 -->
  <text x="40" y="140" fill="#8b6914" font-size="18" font-weight="700">流式3D重建的前馈式3D基础模型</text>

  <!-- 一句话说明 -->
  <text x="40" y="172" fill="#6b5a30" font-size="12">Geometric Context Transformer 统一坐标地锚、密集几何线索与长程漂移校正</text>
  <text x="40" y="192" fill="#8b7355" font-size="11">在单个流式框架中实现高效稳定的 3D 场景重建</text>

  <!-- 分隔线 -->
  <line x1="40" y1="210" x2="600" y2="210" stroke="#d4c4a8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 关键统计卡片 -->
  <rect x="40" y="228" width="170" height="80" rx="10" fill="#f0e8d8" stroke="#d4c4a8" stroke-width="1"/>
  <text x="125" y="260" text-anchor="middle" fill="#8b6914" font-size="32" font-weight="900">9,937</text>
  <text x="125" y="282" text-anchor="middle" fill="#8b7355" font-size="10">⭐ GitHub Stars</text>
  <text x="125" y="296" text-anchor="middle" fill="#c4a97d" font-size="9">即将突破 10K！</text>

  <rect x="225" y="228" width="170" height="80" rx="10" fill="#f0e8d8" stroke="#d4c4a8" stroke-width="1"/>
  <text x="310" y="260" text-anchor="middle" fill="#8b6914" font-size="32" font-weight="900">986</text>
  <text x="310" y="282" text-anchor="middle" fill="#8b7355" font-size="10">🍴 Forks</text>
  <text x="310" y="296" text-anchor="middle" fill="#c4a97d" font-size="9">社区活跃度极高</text>

  <rect x="410" y="228" width="170" height="80" rx="10" fill="#f0e8d8" stroke="#d4c4a8" stroke-width="1"/>
  <text x="495" y="260" text-anchor="middle" fill="#8b6914" font-size="32" font-weight="900">Apache 2.0</text>
  <text x="495" y="282" text-anchor="middle" fill="#8b7355" font-size="10">📜 开源协议</text>
  <text x="495" y="296" text-anchor="middle" fill="#c4a97d" font-size="9">商用友好</text>

  <rect x="595" y="228" width="170" height="80" rx="10" fill="#f0e8d8" stroke="#d4c4a8" stroke-width="1"/>
  <text x="680" y="260" text-anchor="middle" fill="#8b6914" font-size="32" font-weight="900">Python</text>
  <text x="680" y="282" text-anchor="middle" fill="#8b7355" font-size="10">🔧 主语言</text>
  <text x="680" y="296" text-anchor="middle" fill="#c4a97d" font-size="9">PyTorch 2.8 + CUDA 12.8</text>

  <!-- 社区热评 -->
  <rect x="40" y="326" width="500" height="80" rx="8" fill="#f5f0e3" stroke="#d4c4a8" stroke-width="1"/>
  <text x="290" y="352" text-anchor="middle" fill="#8b6914" font-size="12" font-weight="700">🌍 社区评价</text>
  <text x="56" y="374" fill="#5c4033" font-size="11">"A feed-forward 3D foundation model that actually works."</text>
  <text x="56" y="394" fill="#5c4033" font-size="11">"Finally, streaming 3D reconstruction without per-scene optimization."</text>

  <!-- 论文信息 -->
  <rect x="555" y="326" width="580" height="80" rx="8" fill="#f0e8d8" stroke="#c4b89a" stroke-width="1"/>
  <text x="845" y="352" text-anchor="middle" fill="#8b6914" font-size="12" font-weight="700">📄 论文信息</text>
  <text x="571" y="374" fill="#5c4033" font-size="11">arXiv 2604.14141 · Robbyant Team</text>
  <text x="571" y="394" fill="#8b7355" font-size="11">Lin-Zhuo Chen, Jian Gao, Yihang Chen et al.</text>

  <!-- 底部 -->
  <text x="40" y="460" fill="#c4a97d" font-size="9">GitHub: https://github.com/Robbyant/lingbot-map</text>
  <text x="40" y="478" fill="#c4a97d" font-size="9">2026年4月发布 · Apache-2.0 License</text>

  <!-- 右侧装饰 -->
  <rect x="910" y="28" width="225" height="120" rx="12" fill="#3d2b1f"/>
  <text x="1022" y="62" text-anchor="middle" fill="#ffd700" font-size="14" font-weight="700">🔥</text>
  <text x="1022" y="84" text-anchor="middle" fill="#f5f0e0" font-size="11" font-weight="600">三个模型版本</text>
  <text x="940" y="106" fill="#c4a97d" font-size="9">• lingbot-map-long（长序列推荐）</text>
  <text x="940" y="122" fill="#c4a97d" font-size="9">• lingbot-map（全面均衡版）</text>
  <text x="940" y="138" fill="#c4a97d" font-size="9">• lingbot-map-stage1（双向推理）</text>
</svg>
