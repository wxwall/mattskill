<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1175 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#f0e8d8"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf5f0"/>
      <stop offset="100%" stop-color="#f5f0e3"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d2b1f"/>
      <stop offset="100%" stop-color="#5c3d30"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1175" height="500" fill="url(#bg)"/>
  <rect x="0" y="0" width="1175" height="500" fill="none" stroke="#d4c4a8" stroke-width="1"/>

  <!-- 装饰角标 -->
  <rect x="30" y="25" width="60" height="2" rx="1" fill="#c4a97d"/>
  <rect x="30" y="29" width="40" height="2" rx="1" fill="#c4a97d"/>

  <!-- 版本标签 -->
  <rect x="30" y="50" width="130" height="28" rx="14" fill="#c4a97d" opacity="0.3"/>
  <text x="95" y="68" text-anchor="middle" fill="#8b6914" font-size="12" font-family="'SF Mono',Menlo,monospace" font-weight="600">v0.4.0 · MIT</text>

  <!-- 主标题 -->
  <text x="55" y="130" fill="#3d2b1f" font-size="38" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">Meetily 入门</text>

  <!-- 副标题 -->
  <text x="55" y="175" fill="#8b6914" font-size="24" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">打工人狂喜的 AI 会议助手</text>

  <!-- 一句话说明 -->
  <text x="55" y="210" fill="#5c4033" font-size="14" font-family="'PingFang SC','Microsoft YaHei',sans-serif">开源 · 全本地 · 实时转录 + AI 自动总结 · 22.3K+ Stars</text>

  <!-- 分割线 -->
  <line x1="55" y1="230" x2="1120" y2="230" stroke="#d4c4a8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 统计卡片区域 -->
  <rect x="55" y="255" width="1118" height="100" rx="12" fill="url(#banner)"/>

  <!-- Star 统计 -->
  <text x="120" y="295" fill="#ffd700" font-size="36" font-weight="700" text-anchor="middle">22.3K+</text>
  <text x="120" y="318" fill="#c4a97d" font-size="11" text-anchor="middle">GitHub Stars</text>

  <line x1="235" y1="268" x2="235" y2="342" stroke="#5c4033" stroke-width="1"/>

  <text x="295" y="295" fill="#ffd700" font-size="36" font-weight="700" text-anchor="middle">2.3K</text>
  <text x="295" y="318" fill="#c4a97d" font-size="11" text-anchor="middle">Forks</text>

  <line x1="410" y1="268" x2="410" y2="342" stroke="#5c4033" stroke-width="1"/>

  <text x="470" y="295" fill="#ffd700" font-size="36" font-weight="700" text-anchor="middle">556</text>
  <text x="470" y="318" fill="#c4a97d" font-size="11" text-anchor="middle">总提交数</text>

  <line x1="585" y1="268" x2="585" y2="342" stroke="#5c4033" stroke-width="1"/>

  <!-- 核心标签区（右半部分） -->
  <text x="650" y="290" fill="#f5f0e0" font-size="13" font-weight="600">核心特性</text>
  <text x="650" y="315" fill="#c4a97d" font-size="11">🟡 全本地运行</text>
  <text x="650" y="335" fill="#c4a97d" font-size="11">🟡 实时转录</text>

  <rect x="830" y="273" width="130" height="24" rx="12" fill="#6b4c3b"/>
  <text x="895" y="290" text-anchor="middle" fill="#ffd700" font-size="11" font-weight="600">AI 自动总结</text>

  <rect x="970" y="273" width="130" height="24" rx="12" fill="#6b4c3b"/>
  <text x="1035" y="290" text-anchor="middle" fill="#ffd700" font-size="11" font-weight="600">GPU 加速</text>

  <rect x="830" y="305" width="130" height="24" rx="12" fill="#6b4c3b"/>
  <text x="895" y="322" text-anchor="middle" fill="#ffd700" font-size="11" font-weight="600">多平台支持</text>

  <rect x="970" y="305" width="130" height="24" rx="12" fill="#6b4c3b"/>
  <text x="1035" y="322" text-anchor="middle" fill="#ffd700" font-size="11" font-weight="600">MIT 开源</text>

  <!-- 社区热评 -->
  <text x="55" y="395" fill="#3d2b1f" font-size="14" font-weight="700">🌍 开发者怎么说</text>

  <rect x="55" y="410" width="540" height="70" rx="8" fill="url(#cardBg)" stroke="#e8dcc8" stroke-width="1"/>
  <text x="75" y="435" fill="#5c4033" font-size="12" font-style="italic">"Privacy-first AI meeting assistant</text>
  <text x="75" y="458" fill="#5c4033" font-size="12" font-style="italic">that runs entirely on your machine."</text>

  <rect x="615" y="410" width="540" height="70" rx="8" fill="url(#cardBg)" stroke="#e8dcc8" stroke-width="1"/>
  <text x="635" y="435" fill="#5c4033" font-size="12" font-style="italic">"No data leaves your computer.</text>
  <text x="635" y="458" fill="#5c4033" font-size="12" font-style="italic">Real-time transcription + AI summaries."</text>

  <!-- GitHub 来源 -->
  <text x="975" y="485" fill="#c4a97d" font-size="10" text-anchor="end">github.com/Zackriya-Solutions/meetily</text>
</svg>