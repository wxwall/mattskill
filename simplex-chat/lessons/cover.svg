<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1175 500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d2b1f"/>
      <stop offset="100%" stop-color="#5c3d30"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b6914" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c4a97d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5f0e8" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b6914" stop-opacity="0"/>
      <stop offset="30%" stop-color="#8b6914" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#8b6914" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8b6914" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1175" height="500" fill="url(#bgGrad)"/>
  <rect width="1175" height="500" fill="url(#glow)"/>

  <!-- 左侧装饰竖线 -->
  <line x1="60" y1="60" x2="60" y2="440" stroke="#c4a97d" stroke-width="0.5" opacity="0.3"/>
  <line x1="65" y1="60" x2="65" y2="440" stroke="#8b6914" stroke-width="1" opacity="0.2"/>

  <!-- 右上角装饰圆环 -->
  <circle cx="1020" cy="120" r="120" fill="none" stroke="#c4a97d" stroke-width="0.8" opacity="0.12"/>
  <circle cx="1020" cy="120" r="90" fill="none" stroke="#c4a97d" stroke-width="0.6" opacity="0.18"/>
  <circle cx="1020" cy="120" r="60" fill="none" stroke="#c4a97d" stroke-width="0.5" opacity="0.25"/>

  <!-- 版本标签 -->
  <rect x="85" y="70" width="130" height="34" rx="17" fill="#8b6914" opacity="0.9"/>
  <text x="150" y="92" fill="#f5f0e0" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="700" text-anchor="middle">🔥 隐私通讯革命</text>

  <!-- 主标题 -->
  <text x="85" y="175" fill="#f5f0e0" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="52" font-weight="700" letter-spacing="2">完全匿名！</text>

  <!-- 副标题 -->
  <text x="85" y="235" fill="#c4a97d" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="700">SimpleX</text>
  <text x="85" y="280" fill="#e8dcc8" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" opacity="0.85">全球首个无用户 ID 的隐私通讯网络</text>

  <!-- 分隔线 -->
  <rect x="85" y="310" width="360" height="2" fill="url(#lineGrad)" rx="1"/>

  <!-- GitHub 数据卡片 - 3个指标 -->
  <rect x="85" y="335" width="155" height="70" rx="8" fill="url(#cardGrad)" stroke="#c4a97d" stroke-width="0.8" opacity="0.6"/>
  <text x="162" y="365" fill="#ffd700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="30" font-weight="700" text-anchor="middle">16K+</text>
  <text x="162" y="390" fill="#c4a97d" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" opacity="0.7" text-anchor="middle">GitHub Stars</text>

  <rect x="260" y="335" width="155" height="70" rx="8" fill="url(#cardGrad)" stroke="#c4a97d" stroke-width="0.8" opacity="0.6"/>
  <text x="337" y="365" fill="#ffd700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="30" font-weight="700" text-anchor="middle">958</text>
  <text x="337" y="390" fill="#c4a97d" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" opacity="0.7" text-anchor="middle">Forks</text>

  <rect x="435" y="335" width="155" height="70" rx="8" fill="url(#cardGrad)" stroke="#c4a97d" stroke-width="0.8" opacity="0.6"/>
  <text x="512" y="365" fill="#ffd700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="30" font-weight="700" text-anchor="middle">6 年+</text>
  <text x="512" y="390" fill="#c4a97d" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" opacity="0.7" text-anchor="middle">持续开发</text>

  <!-- 社区热评 -->
  <text x="85" y="430" fill="#8b7355" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-style="italic">"The first messaging network operating without user identifiers of any kind"</text>
  <text x="85" y="452" fill="#8b6914" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" opacity="0.7">AGPL-3.0 · Haskell + Kotlin + Swift · iOS / Android / Desktop</text>

  <!-- 右侧抽象图形 -->
  <!-- 声波/波纹 -->
  <rect x="800" y="180" width="90" height="24" rx="6" fill="#8b6914" opacity="0.4"/>
  <text x="845" y="196" fill="#f5f0e0" font-size="11" font-weight="700" text-anchor="middle">入站队列</text>

  <rect x="820" y="220" width="90" height="24" rx="6" fill="#b8956a" opacity="0.4"/>
  <text x="865" y="236" fill="#f5f0e0" font-size="11" font-weight="700" text-anchor="middle">出站队列</text>

  <line x1="845" y1="204" x2="865" y2="220" stroke="#c4a97d" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <line x1="865" y1="220" x2="845" y2="268" stroke="#c4a97d" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>

  <!-- 单向箭头示意 -->
  <!-- 单向消息 -->
  <text x="910" y="192" fill="#e8dcc8" font-size="22" opacity="0.6">→</text>

  <!-- 无用户ID 强调 -->
  <rect x="780" y="265" width="160" height="32" rx="6" fill="none" stroke="#8b6914" stroke-width="1" opacity="0.5"/>
  <text x="860" y="285" fill="#8b6914" font-size="14" font-weight="700" text-anchor="middle">❌ 无用户 ID</text>

  <!-- 底部三个点装饰 -->
  <circle cx="900" cy="330" r="4" fill="#c4a97d" opacity="0.3"/>
  <circle cx="920" cy="330" r="4" fill="#c4a97d" opacity="0.2"/>
  <circle cx="940" cy="330" r="4" fill="#c4a97d" opacity="0.1"/>
</svg>
