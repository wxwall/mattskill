<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1175 500" width="1175" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#fbf7f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#c4a97d"/>
    </linearGradient>
  </defs>
  <rect width="1175" height="500" fill="url(#bg)" rx="0"/>
  <rect x="40" y="475" width="1095" height="2" fill="url(#accent)" opacity="0.3"/>
  <rect x="40" y="40" width="200" height="28" rx="14" fill="none" stroke="#c4a97d" stroke-width="1"/>
  <text x="140" y="58" text-anchor="middle" fill="#8b7355" font-size="12" font-family="'PingFang SC','Microsoft YaHei',sans-serif" letter-spacing="2">Vercel AI Accelerator</text>
  <text x="80" y="140" fill="#3d2b1f" font-size="64" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif" letter-spacing="2">Strix 是什么？</text>
  <text x="80" y="200" fill="#8b6914" font-size="36" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif" letter-spacing="1">开源 AI 黑客，自动找漏洞、修漏洞</text>
  <rect x="80" y="228" width="40" height="2" fill="#c4a97d"/>
  <text x="80" y="270" fill="#5c4033" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    <tspan x="80" dy="0">AI Agent 团队协作：动态分析你的代码，找到漏洞后用</tspan>
    <tspan x="80" dy="28">PoC 验证，自动生成修复 PR。开发者友好的安全测试。</tspan>
  </text>
  <rect x="80" y="330" width="230" height="100" rx="10" fill="#fff" stroke="#e8dcc8" stroke-width="1.5"/>
  <text x="195" y="372" text-anchor="middle" fill="#8b6914" font-size="36" font-weight="700" font-family="Georgia,'PingFang SC',serif">37K+</text>
  <text x="195" y="404" text-anchor="middle" fill="#8b7355" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">GitHub Stars</text>
  <rect x="330" y="330" width="230" height="100" rx="10" fill="#fff" stroke="#e8dcc8" stroke-width="1.5"/>
  <text x="445" y="372" text-anchor="middle" fill="#7d5f52" font-size="36" font-weight="700" font-family="Georgia,'PingFang SC',serif">AI</text>
  <text x="445" y="404" text-anchor="middle" fill="#8b7355" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">Agent 驱动</text>
  <rect x="580" y="330" width="230" height="100" rx="10" fill="#fff" stroke="#e8dcc8" stroke-width="1.5"/>
  <text x="695" y="372" text-anchor="middle" fill="#6b5a30" font-size="36" font-weight="700" font-family="Georgia,'PingFang SC',serif">PoC</text>
  <text x="695" y="404" text-anchor="middle" fill="#8b7355" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">真实验证不误报</text>
  <rect x="830" y="330" width="230" height="100" rx="10" fill="#fff" stroke="#e8dcc8" stroke-width="1.5"/>
  <text x="945" y="372" text-anchor="middle" fill="#5c4033" font-size="36" font-weight="700" font-family="Georgia,'PingFang SC',serif">PR</text>
  <text x="945" y="404" text-anchor="middle" fill="#8b7355" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">自动修复+提PR</text>
  <text x="900" y="460" fill="#c4a97d" font-size="12" font-family="'PingFang SC','Microsoft YaHei',sans-serif" text-anchor="end" font-style="italic">"终于有个 AI 安全工具不是只会给 PDF 报告了"</text>
